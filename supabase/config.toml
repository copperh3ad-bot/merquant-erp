# Supabase project config — function-level deployment settings.
#
# IMPORTANT: this file controls behaviour when functions are deployed via
# `supabase functions deploy <name>` (CLI). The Supabase CLI reads these
# stanzas to set platform-level options like `verify_jwt`. The in-handler
# user-lookup in src/index.ts is the authoritative gate; this is
# defence-in-depth so that an accidental redeploy without a flag doesn't
# silently disable the JWT check.
#
# To redeploy a function:
#   supabase functions deploy ai-proxy
# (the CLI reads `verify_jwt` from this file)

[functions.ai-proxy]
verify_jwt = true

[functions.classify-components]
verify_jwt = true

[functions.extract-barcodes]
verify_jwt = true

[functions.extract-document]
verify_jwt = true

[functions.gmail-crawl]
verify_jwt = true

[functions.gmail-oauth]
verify_jwt = true

[functions.user-approval]
verify_jwt = true

# Agent layer (mig 0033+).
[functions.memory-writer]
verify_jwt = true

[functions.ai-assistant-v2]
verify_jwt = true

# Email PO agent (Phase 5).
[functions.email-po-agent]
verify_jwt = true

[functions.imap-test-connection]
verify_jwt = true

[functions.imap-credentials-save]
verify_jwt = true

# TNA risk agent (Phase 6).
# Invoked via the UI by Owner/Manager — JWT-gated. Will be hooked to a daily
# cron (pg_cron) post-PAUSE, at which point a separate cron-only entry may be
# added with verify_jwt = false + secret-header guard.
[functions.tna-risk-agent]
verify_jwt = true

# BOM calculator (Phase 10) — fabric + thread consumption, formula engine
# driven. Modes: parse | calculate | full | suggest_seams. JWT-gated.
[functions.bom-calculator]
verify_jwt = true

# PO fabric calculator (Phase 11) — wraps mig 0039's
# `calculate_po_fabric_requirements` RPC. Modes: calculate | preview.
[functions.po-fabric-calculator]
verify_jwt = true

# Fabric order generator (Phase 12) — auto-generates fabric_order_drafts
# from po_fabric_requirements with capacity-first inhouse routing.
[functions.fabric-order-generator]
verify_jwt = true

# Cron / scheduled functions are invoked by Supabase's internal scheduler
# with a service-role key, not by user JWTs. They run with verify_jwt off
# but their handlers must check that the secret cron header matches.
[functions.backup-hourly]
verify_jwt = false

[functions.notify-pricing-pending]
verify_jwt = false

# Phase 2/3 — agentic background jobs.
# agent-orchestrator: invoked by mig 0034 DB triggers via pg_net with
# Authorization: Bearer <service_role_key>. memory-consolidation-agent +
# email-crawler-agent: invoked by pg_cron via pg_net (mig 0036). Same auth
# pattern. verify_jwt = true is fine — service-role keys are valid JWTs and
# pass the check, while blocking unauthenticated callers.
[functions.agent-orchestrator]
verify_jwt = true

[functions.memory-consolidation-agent]
verify_jwt = true

[functions.email-crawler-agent]
verify_jwt = true
