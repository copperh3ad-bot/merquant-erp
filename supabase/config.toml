# Supabase project config — function-level deployment settings.
#
# IMPORTANT: this file controls behaviour when functions are deployed via
# `supabase functions deploy <name>` (CLI). The Supabase CLI reads these
# stanzas to set platform-level options like `verify_jwt`. The in-handler
# user-lookup in src/index.ts is the authoritative gate; this is
# defence-in-depth so that an accidental redeploy without a flag doesn't
# silently disable the JWT check.
#
# To redeploy a function:
#   supabase functions deploy ai-proxy
# (the CLI reads `verify_jwt` from this file)

[functions.ai-proxy]
verify_jwt = true

[functions.classify-components]
verify_jwt = true

[functions.extract-barcodes]
verify_jwt = true

[functions.extract-document]
verify_jwt = true

[functions.gmail-crawl]
verify_jwt = true

[functions.gmail-oauth]
verify_jwt = true

[functions.user-approval]
verify_jwt = true

# Agent layer (mig 0033+).
[functions.memory-writer]
verify_jwt = true

# Cron / scheduled functions are invoked by Supabase's internal scheduler
# with a service-role key, not by user JWTs. They run with verify_jwt off
# but their handlers must check that the secret cron header matches.
[functions.backup-hourly]
verify_jwt = false

[functions.notify-pricing-pending]
verify_jwt = false
